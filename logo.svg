<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    <linearGradient id="grad-amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#FBBF24"/>
    </linearGradient>
  </defs>
  
  <!-- Icon: Two connected people forming J+P -->
  <circle cx="30" cy="35" r="10" fill="url(#grad)"/>
  <path d="M22 50 C22 50 20 70 30 70 C35 70 38 60 38 55" stroke="url(#grad)" stroke-width="5" stroke-linecap="round" fill="none"/>
  
  <circle cx="55" cy="35" r="10" fill="url(#grad-amber)"/>
  <path d="M47 50 L47 70" stroke="url(#grad-amber)" stroke-width="5" stroke-linecap="round"/>
  <path d="M47 55 L62 55" stroke="url(#grad-amber)" stroke-width="5" stroke-linecap="round"/>
  <path d="M62 55 L62 48" stroke="url(#grad-amber)" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Connection line between them -->
  <path d="M38 42 L47 42" stroke="url(#grad)" stroke-width="2.5" stroke-dasharray="3 3" opacity="0.5"/>
  
  <!-- Wordmark -->
  <text x="80" y="62" font-family="Inter, -apple-system, sans-serif" font-size="48" font-weight="900" letter-spacing="-2">
    <tspan fill="#4F46E5">Joyn</tspan><tspan fill="#F59E0B">Pal</tspan>
  </text>
</svg>