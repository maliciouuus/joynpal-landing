<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="50%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#FBBF24"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- App icon background -->
  <rect width="512" height="512" rx="115" fill="url(#bg-grad)"/>
  
  <!-- Subtle inner glow -->
  <rect width="512" height="512" rx="115" fill="url(#bg-grad)" opacity="0.5"/>
  <circle cx="400" cy="100" r="200" fill="white" opacity="0.05"/>
  
  <!-- The Mark: Two circles connecting with a heart -->
  <!-- Left circle (white) -->
  <circle cx="195" cy="220" r="72" fill="white" opacity="0.95" filter="url(#shadow)"/>
  <!-- Right circle (amber) -->
  <circle cx="317" cy="220" r="72" fill="url(#amber)" opacity="0.95" filter="url(#shadow)"/>
  
  <!-- Connection overlap -->
  <ellipse cx="256" cy="220" rx="33" ry="60" fill="white" opacity="0.2"/>
  
  <!-- Heart in center -->
  <path d="M256 252 L240 236 C228 224, 228 206, 240 198 C246 192, 252 192, 256 198 C260 192, 266 192, 272 198 C284 206, 284 224, 272 236 Z" fill="white" opacity="0.95"/>
  
  <!-- Small smile on left circle -->
  <path d="M178 235 Q195 255 212 235" stroke="#4F46E5" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.6"/>
  <!-- Eyes on left -->
  <circle cx="183" cy="210" r="5" fill="#4F46E5" opacity="0.5"/>
  <circle cx="207" cy="210" r="5" fill="#4F46E5" opacity="0.5"/>
  
  <!-- Small smile on right circle -->
  <path d="M300 235 Q317 255 334 235" stroke="white" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.7"/>
  <!-- Eyes on right -->
  <circle cx="305" cy="210" r="5" fill="white" opacity="0.6"/>
  <circle cx="329" cy="210" r="5" fill="white" opacity="0.6"/>
  
  <!-- JP letters subtly below -->
  <text x="256" y="370" text-anchor="middle" font-family="Inter, -apple-system, Helvetica, sans-serif" font-size="52" font-weight="900" fill="white" opacity="0.95" letter-spacing="-1">
    JoynPal
  </text>
</svg>