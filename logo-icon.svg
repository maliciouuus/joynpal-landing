<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  
  <!-- Two connected figures -->
  <!-- Person 1 -->
  <circle cx="36" cy="32" r="9" fill="white"/>
  <path d="M28 46 C28 46 26 66 36 66 C41 66 44 56 44 51" stroke="white" stroke-width="5" stroke-linecap="round" fill="none"/>
  
  <!-- Person 2 -->
  <circle cx="64" cy="32" r="9" fill="#FBBF24"/>
  <path d="M56 46 L56 66" stroke="#FBBF24" stroke-width="5" stroke-linecap="round"/>
  <path d="M56 52 L72 52" stroke="#FBBF24" stroke-width="5" stroke-linecap="round"/>
  <path d="M72 52 L72 46" stroke="#FBBF24" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Connection -->
  <path d="M44 38 Q50 34 56 38" stroke="rgba(255,255,255,0.4)" stroke-width="2" fill="none"/>
</svg>